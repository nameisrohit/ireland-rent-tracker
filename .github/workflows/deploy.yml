# .github/workflows/deploy.yml
# ============================================================
# Continuous Deployment Pipeline
#
# What is this?
# This workflow runs automatically every time code
# is pushed to the main branch.
#
# It:
# 1. Runs the CI checks first
# 2. Notifies Streamlit Cloud to redeploy
# 3. Reports success or failure
#
# In a real company this might also:
# - Deploy to AWS ECS
# - Run database migrations
# - Send Slack notifications
# ============================================================

name: CD — Deploy to Streamlit Cloud

# Only run on pushes to main branch
# Not on pull requests — only when code is merged
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Dashboard
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dashboard.txt

      # Step 4 — Validate dashboard file exists
      - name: Validate dashboard
        run: |
          echo "Checking dashboard file..."
          test -f dashboard/app.py && \
            echo "✅ dashboard/app.py exists" || \
            exit 1

          echo "Checking scraper file..."
          test -f scraper/rtb_scraper.py && \
            echo "✅ scraper/rtb_scraper.py exists" || \
            exit 1

          echo "Checking dbt models..."
          test -d dbt/models && \
            echo "✅ dbt models exist" || \
            exit 1

          echo "Checking Terraform..."
          test -f infrastructure/main.tf && \
            echo "✅ Terraform files exist" || \
            exit 1

      # Step 5 — Streamlit Cloud auto deploys on push
      # No manual trigger needed — Streamlit Cloud watches
      # your GitHub repo and redeploys automatically
      - name: Confirm deployment
        run: |
          echo "================================================"
          echo "✅ Code pushed to main branch"
          echo "✅ All checks passed"
          echo "🚀 Streamlit Cloud will redeploy automatically"
          echo "🌐 https://ireland-rent-tracker-dashboard.streamlit.app"
          echo "================================================"

      # Step 6 — Post deployment summary
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | [Open App](https://ireland-rent-tracker-dashboard.streamlit.app) |" >> $GITHUB_STEP_SUMMARY